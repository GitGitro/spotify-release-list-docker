name: Build & push Docker image on upstream commit

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get upstream HEAD SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/jakubito/spotify-release-list.git refs/heads/master | cut -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Check if SHA already tagged
        id: already_built
        run: |
          if git tag --list | grep -q "${{ steps.upstream.outputs.sha_short }}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.already_built.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.already_built.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.already_built.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.upstream.outputs.sha_short }}
            ghcr.io/${{ steps.repo.outputs.name }}:latest
          build-args: |
            REACT_APP_URL=${{ vars.REACT_APP_URL }}
            REACT_APP_SPOTIFY_CLIENT_ID=${{ secrets.REACT_APP_SPOTIFY_CLIENT_ID }}
            REACT_APP_SENTRY_DSN=${{ secrets.REACT_APP_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag this repo with the upstream SHA
        if: steps.already_built.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.upstream.outputs.sha_short }}"
          git push origin "${{ steps.upstream.outputs.sha_short }}"
